<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spendify</title>
  <link rel="icon" type="image/png" href="/spendify_logo.png" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Lexend:wght@500;600&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "primary": "#C9A96E",
            "primary-hover": "#E2C28A",
            "bg-dark": "#0A0A0A",
            "bg-surface": "#111111",
            "bg-surface-secondary": "#1A1A1A",
            "text-primary": "#F5F3EE",
            "text-secondary": "#888780",
            "accent-success": "#5DCAA5",
            "accent-danger": "#E24B4A"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "spacing": {
            "xs": "4px",
            "margin-mobile": "20px",
            "unit": "4px",
            "sm": "8px",
            "xl": "32px",
            "md": "16px",
            "lg": "24px",
            "gutter": "16px"
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    body {
      background-color: #000000;
      color: #ffffff;
      -webkit-font-smoothing: antialiased;
    }

    .glass-card {
      background-color: rgba(28, 28, 30, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .activity-ring-bg {
      fill: none;
      stroke: #2C2C2E;
      stroke-width: 12;
    }

    .activity-ring-progress {
      fill: none;
      stroke-width: 12;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
      transition: stroke-dasharray 0.3s ease;
    }

    .badge-3d {
      position: relative;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.2), transparent 60%);
      box-shadow:
        inset 0 2px 4px rgba(255, 255, 255, 0.3),
        inset 0 -2px 4px rgba(0, 0, 0, 0.5),
        0 4px 10px rgba(0, 0, 0, 0.4);
      transition: transform 0.2s ease;
    }

    .badge-3d::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 9999px;
      background: linear-gradient(135deg, transparent 40%, rgba(255, 255, 255, 0.1) 50%, transparent 60%);
      pointer-events: none;
    }

    .badge-3d:active {
      transform: scale(0.95) rotateY(10deg);
    }
  </style>
</head>

<body class="bg-black font-body-md overflow-x-hidden pb-24 text-white">
  <div id="root" class="flex-1 flex flex-col w-full h-full"></div>
  <div id="cursor-dot"></div>
  <div id="cursor-ring"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
