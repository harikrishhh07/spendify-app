<!DOCTYPE html>
<html lang="en" class="dark">

<head>

    rel="stylesheet" />

    tailwind.config = {

      theme: {
        extend: {
          "colors": {

            "surface": "#131313",
            "error": "#ffb4ab",
            "outline-variant": "#444933",
            "on-tertiary-fixed": "#002022",
            "on-primary-fixed": "#161e00",
            "outline": "#8e9379",
            "surface-container-lowest": "#0e0e0e",
            "tertiary-container": "#7df4ff",
            "tertiary-fixed-dim": "#00dbe9",
            "on-surface": "#e2e2e2",
            "on-secondary-fixed": "#3f0019",
            "inverse-surface": "#e2e2e2",
            "primary-container": "#c3f400",
            "on-background": "#e2e2e2",
            "primary-fixed": "#c3f400",
            "primary-fixed-dim": "#abd600",
            "surface-dim": "#131313",
            "on-tertiary-fixed-variant": "#004f54",
            "on-secondary-fixed-variant": "#8f0041",
            "surface-tint": "#abd600",
            "surface-container": "#1f1f1f",
            "surface-variant": "#353535",
            "secondary-container": "#ff4b89",
            "on-primary": "#283500",
            "surface-bright": "#393939",
            "on-secondary": "#66002c",
            "primary": "#ffffff",
            "on-primary-fixed-variant": "#3c4d00",
            "inverse-primary": "#506600",
            "on-tertiary": "#00363a",
            "on-error-container": "#ffdad6",
            "secondary-fixed-dim": "#ffb1c3",
            "secondary": "#ffb1c3",
            "inverse-on-surface": "#303030",
            "secondary-fixed": "#ffd9e0",
            "on-primary-container": "#556d00",
            "on-surface-variant": "#c4c9ac",
            "on-error": "#690005",
            "surface-container-low": "#1b1b1b",
            "surface-container-high": "#2a2a2a",
            "on-secondary-container": "#590026",
            "surface-container-highest": "#353535",
            "on-tertiary-container": "#006f77",
            "background": "#131313",
            "error-container": "#93000a"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "spacing": {
            "xs": "4px",
            "margin-mobile": "20px",
            "unit": "4px",
            "sm": "8px",
            "xl": "32px",
            "md": "16px",
            "lg": "24px",
            "gutter": "16px"
          },
          "fontFamily": {
            "label-caps": ["Lexend"],
            "display-xl": ["Inter"],
            "headline-md": ["Inter"],
            "body-md": ["Inter"],
            "body-lg": ["Inter"],
            "headline-lg": ["Inter"],
            "numeric-data": ["Lexend"]
          },
          "fontSize": {
            "label-caps": ["12px", { "lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "600" }],
            "display-xl": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "800" }],
            "headline-md": ["24px", { "lineHeight": "1.2", "fontWeight": "700" }],

            "numeric-data": ["20px", { "lineHeight": "1", "fontWeight": "500" }]

        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    body {
      background-color: #000000;
      color: #ffffff;
      -webkit-font-smoothing: antialiased;
    }

    .glass-card {
      background-color: rgba(28, 28, 30, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .activity-ring-bg {
      fill: none;
      stroke: #2C2C2E;
      stroke-width: 12;
    }

    .activity-ring-progress {
      fill: none;
      stroke-width: 12;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
      transition: stroke-dasharray 0.3s ease;
    }

    .badge-3d {
      position: relative;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.2), transparent 60%);
      box-shadow:
        inset 0 2px 4px rgba(255, 255, 255, 0.3),
        inset 0 -2px 4px rgba(0, 0, 0, 0.5),
        0 4px 10px rgba(0, 0, 0, 0.4);
      transition: transform 0.2s ease;
    }

    .badge-3d::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 9999px;
      background: linear-gradient(135deg, transparent 40%, rgba(255, 255, 255, 0.1) 50%, transparent 60%);
      pointer-events: none;
    }

    .badge-3d:active {
      transform: scale(0.95) rotateY(10deg);
    }
  </style>
</head>

<body class="bg-black font-body-md overflow-x-hidden pb-24 text-white">
  <div id="root" class="flex-1 flex flex-col w-full h-full"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
