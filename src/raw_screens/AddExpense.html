<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&amp;family=Lexend:wght@500;600;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "tertiary-fixed": "#7df4ff",
                "tertiary": "#ffffff",
                "surface": "#131313",
                "error": "#ffb4ab",
                "outline-variant": "#444933",
                "on-tertiary-fixed": "#002022",
                "on-primary-fixed": "#161e00",
                "outline": "#8e9379",
                "surface-container-lowest": "#0e0e0e",
                "tertiary-container": "#7df4ff",
                "tertiary-fixed-dim": "#00dbe9",
                "on-surface": "#e2e2e2",
                "on-secondary-fixed": "#3f0019",
                "inverse-surface": "#e2e2e2",
                "primary-container": "#c3f400",
                "on-background": "#e2e2e2",
                "primary-fixed": "#c3f400",
                "primary-fixed-dim": "#abd600",
                "surface-dim": "#131313",
                "on-tertiary-fixed-variant": "#004f54",
                "on-secondary-fixed-variant": "#8f0041",
                "surface-tint": "#abd600",
                "surface-container": "#1f1f1f",
                "surface-variant": "#353535",
                "secondary-container": "#ff4b89",
                "on-primary": "#283500",
                "surface-bright": "#393939",
                "on-secondary": "#66002c",
                "primary": "#ffffff",
                "on-primary-fixed-variant": "#3c4d00",
                "inverse-primary": "#506600",
                "on-tertiary": "#00363a",
                "on-error-container": "#ffdad6",
                "secondary-fixed-dim": "#ffb1c3",
                "secondary": "#ffb1c3",
                "inverse-on-surface": "#303030",
                "secondary-fixed": "#ffd9e0",
                "on-primary-container": "#556d00",
                "on-surface-variant": "#c4c9ac",
                "on-error": "#690005",
                "surface-container-low": "#1b1b1b",
                "surface-container-high": "#2a2a2a",
                "on-secondary-container": "#590026",
                "surface-container-highest": "#353535",
                "on-tertiary-container": "#006f77",
                "background": "#131313",
                "error-container": "#93000a"
            },
            "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
            },
            "spacing": {
                "xs": "4px",
                "margin-mobile": "20px",
                "unit": "4px",
                "sm": "8px",
                "xl": "32px",
                "md": "16px",
                "lg": "24px",
                "gutter": "16px"
            },
            "fontFamily": {
                "label-caps": ["Lexend"],
                "display-xl": ["Inter"],
                "headline-md": ["Inter"],
                "body-md": ["Inter"],
                "body-lg": ["Inter"],
                "headline-lg": ["Inter"],
                "numeric-data": ["Lexend"]
            },
            "fontSize": {
                "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "600"}],
                "display-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "800"}],
                "headline-md": ["24px", {"lineHeight": "1.2", "fontWeight": "700"}],
                "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                "body-lg": ["18px", {"lineHeight": "1.5", "fontWeight": "400"}],
                "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                "numeric-data": ["20px", {"lineHeight": "1", "fontWeight": "500"}]
            }
          }
        }
      }
    </script>
<style>
        .glass-card {
            background-color: rgba(28, 28, 30, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-noise {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen font-body-md relative overflow-x-hidden">
<div class="fixed inset-0 bg-noise pointer-events-none"></div>
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 bg-black/70 backdrop-blur-[20px] border-b border-white/15 flex justify-between items-center px-5 py-4">
<div class="flex items-center gap-3">
<button class="active:scale-95 transition-all text-[#CCFF00]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-black tracking-tighter uppercase text-lg text-[#CCFF00]">NEW EXPENSE</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-white/60 hover:opacity-80 active:scale-95 transition-all" data-icon="notifications">notifications</span>
<div class="w-8 h-8 rounded-full border border-white/15 overflow-hidden">
<img class="w-full h-full object-cover" data-alt="close up professional portrait of a man with minimalist aesthetic and dramatic lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC3HvCILNb57eS45uNFS-h2azqa6JF7ReEJe_4Mw21WpUx6jZ7sZbkNqxJu19kPWy8c9EA3sMS1IpPN63NIGlDvddKn2SpHEiizUJ8V4lVcs2Wku5lOGOcu5uYAp2BDMrYrxml5PdwbfpNZZHVmZxWDNdcTaba5V5ITD64ZHTCTGM5J0yX0ssgAN-9EgriKDmoyAyxIZrbpWlu-ZCRTuIEtTXsutf7JaWaCR2gjajFM65oVaTOn80ode_XkPLA7qhTmb9Z3flrs1OV3"/>
</div>
</div>
</header>
<main class="pt-24 pb-32 px-margin-mobile flex flex-col gap-xl max-w-lg mx-auto">
<!-- Amount Entry Section (Fitness Style) -->
<section class="flex flex-col items-center justify-center py-lg">
<span class="font-label-caps text-label-caps text-white/40 mb-xs">AMOUNT</span>
<div class="flex items-baseline gap-xs">
<span class="font-display-xl text-headline-lg text-[#CCFF00] opacity-50">$</span>
<span class="font-display-xl text-display-xl tracking-tighter text-white">45.00</span>
</div>
</section>
<!-- Category Grid (Neon Accents) -->
<section class="grid grid-cols-4 gap-sm">
<div class="flex flex-col items-center gap-xs">
<div class="w-14 h-14 rounded-full flex items-center justify-center glass-card border-[#CCFF00] ring-1 ring-[#CCFF00]/30">
<span class="material-symbols-outlined text-[#CCFF00]" data-icon="restaurant" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<span class="font-label-caps text-[10px] text-white">FOOD</span>
</div>
<div class="flex flex-col items-center gap-xs">
<div class="w-14 h-14 rounded-full flex items-center justify-center glass-card">
<span class="material-symbols-outlined text-[#7df4ff]" data-icon="directions_car">directions_car</span>
</div>
<span class="font-label-caps text-[10px] text-white/60">TRAVEL</span>
</div>
<div class="flex flex-col items-center gap-xs">
<div class="w-14 h-14 rounded-full flex items-center justify-center glass-card">
<span class="material-symbols-outlined text-[#ff4b89]" data-icon="shopping_bag">shopping_bag</span>
</div>
<span class="font-label-caps text-[10px] text-white/60">SHOP</span>
</div>
<div class="flex flex-col items-center gap-xs">
<div class="w-14 h-14 rounded-full flex items-center justify-center glass-card">
<span class="material-symbols-outlined text-white" data-icon="more_horiz">more_horiz</span>
</div>
<span class="font-label-caps text-[10px] text-white/60">OTHER</span>
</div>
</section>
<!-- Form Fields (Glassmorphism) -->
<section class="flex flex-col gap-md">
<div class="glass-card p-md rounded-xl flex items-center justify-between">
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-white/40">MERCHANT</span>
<span class="font-body-lg text-body-lg text-white">Whole Foods Market</span>
</div>
<span class="material-symbols-outlined text-white/20">edit</span>
</div>
<div class="glass-card p-md rounded-xl flex items-center justify-between">
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-white/40">DATE</span>
<span class="font-body-lg text-body-lg text-white">Today, 2:45 PM</span>
</div>
<span class="material-symbols-outlined text-white/20">calendar_today</span>
</div>
</section>
<!-- Numeric Keypad -->
<section class="grid grid-cols-3 gap-sm mt-md">
<button class="h-16 flex items-center justify-center rounded-lg active:bg-white/10 transition-colors">
<span class="font-numeric-data text-headline-md text-white">1</span>
</button>
<button class="h-16 flex items-center justify-center rounded-lg active:bg-white/10 transition-colors">
<span class="font-numeric-data text-headline-md text-white">2</span>
</button>
<button class="h-16 flex items-center justify-center rounded-lg active:bg-white/10 transition-colors">
<span class="font-numeric-data text-headline-md text-white">3</span>
</button>
<button class="h-16 flex items-center justify-center rounded-lg active:bg-white/10 transition-colors">
<span class="font-numeric-data text-headline-md text-white">4</span>
</button>
<button class="h-16 flex items-center justify-center rounded-lg active:bg-white/10 transition-colors">
<span class="font-numeric-data text-headline-md text-white">5</span>
</button>
<button class="h-16 flex items-center justify-center rounded-lg active:bg-white/10 transition-colors">
<span class="font-numeric-data text-headline-md text-white">6</span>
</button>
<button class="h-16 flex items-center justify-center rounded-lg active:bg-white/10 transition-colors">
<span class="font-numeric-data text-headline-md text-white">7</span>
</button>
<button class="h-16 flex items-center justify-center rounded-lg active:bg-white/10 transition-colors">
<span class="font-numeric-data text-headline-md text-white">8</span>
</button>
<button class="h-16 flex items-center justify-center rounded-lg active:bg-white/10 transition-colors">
<span class="font-numeric-data text-headline-md text-white">9</span>
</button>
<button class="h-16 flex items-center justify-center rounded-lg active:bg-white/10 transition-colors">
<span class="font-numeric-data text-headline-md text-white">.</span>
</button>
<button class="h-16 flex items-center justify-center rounded-lg active:bg-white/10 transition-colors">
<span class="font-numeric-data text-headline-md text-white">0</span>
</button>
<button class="h-16 flex items-center justify-center rounded-lg active:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-white" data-icon="backspace">backspace</span>
</button>
</section>
<!-- CTA Action -->
<button class="w-full h-14 bg-[#CCFF00] rounded-full flex items-center justify-center active:scale-95 transition-all shadow-[0_0_20px_rgba(204,255,0,0.3)]">
<span class="font-label-caps text-black font-black uppercase tracking-widest">SAVE TRANSACTION</span>
</button>
</main>
<!-- BottomNavBar (Suppressed check: Visible only on top-level, but here we include it for structure consistency with shared components but keep primary focus on the form) -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-black/70 backdrop-blur-[20px] border-t border-white/15 flex justify-around items-center px-4 pb-8 pt-3">
<div class="flex flex-col items-center justify-center text-gray-500 hover:text-white transition-colors active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-bold text-[10px] uppercase tracking-widest">Summary</span>
</div>
<div class="flex flex-col items-center justify-center text-gray-500 hover:text-white transition-colors active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="monitoring">monitoring</span>
<span class="font-bold text-[10px] uppercase tracking-widest">Trends</span>
</div>
<!-- Active Tab Context: Adding an expense is a central activity, but "Summary" is often the root of this action -->
<div class="flex flex-col items-center justify-center text-[#CCFF00] scale-105 active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="account_balance_wallet" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
<span class="font-bold text-[10px] uppercase tracking-widest">Wallet</span>
</div>
<div class="flex flex-col items-center justify-center text-gray-500 hover:text-white transition-colors active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-bold text-[10px] uppercase tracking-widest">Profile</span>
</div>
</nav>
</body></html>
